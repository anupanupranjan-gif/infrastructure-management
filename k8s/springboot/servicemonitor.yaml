apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: springboot-servicemonitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: advanced-search-app
  namespaceSelector:
    matchNames:
      - commerce
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s